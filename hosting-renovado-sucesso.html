<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Renovação concluída • Portal SiqueiraX</title>
  <style>
    :root{
      --line:rgba(255,255,255,.08);
      --text:#f5f7fb;
      --muted:#a6adbb;
      --red:#b91c1c;
      --red2:#ef4444;
      --ok:#22c55e;
      --warn:#f59e0b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(circle at top, rgba(185,28,28,.30), transparent 35%),
        linear-gradient(180deg,#09090d 0%, #0f0f15 100%);
      color:var(--text);
    }
    .wrap{max-width:900px;margin:0 auto;padding:28px 18px 42px;}
    .hero{
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(185,28,28,.18), rgba(17,17,24,.92));
      border-radius:26px;
      padding:28px;
    }
    .badge{
      display:inline-flex;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(239,68,68,.12);
      color:#fecaca;
      font-size:12px;
      font-weight:800;
    }
    h1{margin:16px 0 10px;font-size:38px;}
    .sub{color:var(--muted);font-size:15px;}
    .panel{
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
      margin-top:18px;
      background:rgba(255,255,255,.02);
    }
    .status{
      padding:14px;
      border-radius:16px;
      background:rgba(34,197,94,.08);
      color:#bbf7d0;
      border:1px solid rgba(34,197,94,.14);
      font-weight:700;
    }
    .status.warn{
      background:rgba(245,158,11,.08);
      color:#fde68a;
      border-color:rgba(245,158,11,.14);
    }
    .meta{
      margin-top:14px;
      padding:14px;
      border:1px solid var(--line);
      border-radius:16px;
      background:rgba(255,255,255,.03);
    }
    .meta b{display:block;color:var(--muted);font-size:12px;margin-bottom:6px}
    .btnRow{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      padding:12px 16px;
      border-radius:14px;
      text-decoration:none;
      font-weight:800;
    }
    .btn-red{
      background:linear-gradient(180deg, var(--red2), var(--red));
      color:white;
    }
    .btn-dark{
      background:#171723;
      color:var(--text);
      border:1px solid var(--line);
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="badge">Renovação de hosting • Portal SiqueiraX</div>
    <h1>Pagamento recebido</h1>
    <p class="sub">Sua renovação foi processada com sucesso.</p>

    <div class="panel">
      <div id="status" class="status">Registrando renovação...</div>

      <div class="meta">
        <b>Host</b>
        <div id="hostName">-</div>
      </div>

      <div class="meta">
        <b>Plano</b>
        <div id="planName">-</div>
      </div>

      <div class="meta">
        <b>Discord ID</b>
        <div id="discordId">-</div>
      </div>

      <div class="meta">
        <b>Novo vencimento</b>
        <div id="newDue">-</div>
      </div>

      <div class="btnRow">
        <a class="btn btn-red" href="/renovar-hosting.html">Menu Cliente</a>
        <a class="btn btn-dark" href="/">Ir para o site</a>
      </div>
    </div>
  </div>
</div>

<script>
(async function(){

  const PENDING_KEY = "sx_pending_renewal";

  function getParam(name){
    try { return new URL(window.location.href).searchParams.get(name); }
    catch { return null; }
  }

  function readPending(){
    try { return JSON.parse(localStorage.getItem(PENDING_KEY) || "null"); }
    catch { return null; }
  }

  const statusEl = document.getElementById('status');
  const hostEl = document.getElementById('hostName');
  const planEl = document.getElementById('planName');
  const discordEl = document.getElementById('discordId');
  const dueEl = document.getElementById('newDue');

  let host = getParam('host');
  let plan = getParam('plan');
  let discordId = getParam('discord_id');
  let tx = getParam('tx');

  if (!host || !discordId) {
    const pending = readPending();
    if (pending) {
      host = host || pending.host;
      plan = plan || pending.plan;
      discordId = discordId || pending.discord_id;
      tx = tx || pending.tx;
    }
  }

  if (!host || !discordId) {
    statusEl.className = "status warn";
    statusEl.textContent = "Não foi possível validar a renovação.";
    return;
  }

  hostEl.textContent = host;
  planEl.textContent = plan || "-";
  discordEl.textContent = discordId;

  const res = await fetch("/.netlify/functions/notify-renewal", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ host, plan, discord_id: discordId, tx })
  });

  const body = await res.json().catch(()=>({}));

  if (res.ok && body.ok) {
    statusEl.textContent = "✅ Renovação registrada com sucesso.";
    if (body.novo_vencimento) {
      dueEl.textContent = new Date(body.novo_vencimento).toLocaleString("pt-BR");
    }
    localStorage.removeItem(PENDING_KEY);
  } else {
    statusEl.className = "status warn";
    statusEl.textContent = "⚠️ Houve um problema ao registrar a renovação.";
  }

})();
</script>
</body>
</html>
