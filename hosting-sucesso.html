<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hosting SX | Pagamento</title>
<style>
  body{margin:0;font-family:Arial;background:#0b0b0d;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh}
  .box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);padding:40px;border-radius:20px;text-align:center;max-width:600px}
  h1{color:#ff394b;margin-bottom:8px} p{color:#ccc}
  .status{margin:20px 0;padding:12px;border-radius:10px;background:rgba(255,255,255,0.05)}
  .btn{display:inline-block;padding:12px 20px;border-radius:10px;background:linear-gradient(135deg,#e11d2e,#ff394b);color:#fff;text-decoration:none;font-weight:bold}
</style>
</head>
<body>
  <div class="box">
    <h1>Pagamento recebido</h1>
    <p>Seu pedido foi enviado com sucesso.</p>

    <div class="status" id="statusBox">Verificando informações...</div>

    <p>Após a confirmação do pagamento, sua hosting será entregue.</p>
    <a href="/hosting.html" class="btn">Voltar para o site</a>
  </div>

<script>
function getParam(name) {
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

const statusBox = document.getElementById("statusBox");
const refRaw = getParam("ref");
let plan = getParam("plan");

// caso você tenha colocado ref como "ID|plan" em algum lugar (fallback)
let discordId = null;
if (refRaw) {
  if (refRaw.includes('|')) {
    const parts = refRaw.split('|');
    discordId = decodeURIComponent(parts[0] || '').trim();
    if (!plan) plan = decodeURIComponent(parts[1] || '').trim();
  } else {
    discordId = decodeURIComponent(refRaw).trim();
  }
}

if (!discordId) {
  statusBox.innerHTML = "⚠️ Não foi possível identificar o cliente.";
} else {
  statusBox.innerHTML = `
    ✔️ Cliente identificado<br>
    ID: <b>${discordId}</b><br><br>
    Aguarde enquanto verificamos seu pagamento.
  `;

  // chama notify-purchase automaticamente (envia plan quando disponível)
  (async () => {
    try {
      // se plan ainda não veio, envia sem plan (será 'desconhecido') — idealmente sempre enviar plan
      const payload = { discord_id: discordId };
      if (plan) payload.plan = plan;

      const resp = await fetch("/.netlify/functions/notify-purchase", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await resp.json().catch(()=>({}));
      if (resp.ok) {
        statusBox.innerHTML += `<br><br>✅ ${data.message || "Pedido registrado com sucesso."}`;
      } else {
        // mostra erro legível
        const msg = data?.message || data?.error || JSON.stringify(data);
        statusBox.innerHTML += `<br><br>⚠️ Problema ao registrar pedido: ${msg}`;
      }
    } catch (err) {
      console.error("notify-purchase fetch error:", err);
      statusBox.innerHTML += `<br><br>⚠️ Erro ao notificar o servidor: ${err.message || err}`;
    }
  })();
}
</script>
</body>
</html>
