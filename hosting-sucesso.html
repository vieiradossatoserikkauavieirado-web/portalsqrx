<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hosting SX | Pagamento</title>
<style>
  body{margin:0;font-family:Arial;background:#0b0b0d;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh}
  .box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);padding:40px;border-radius:20px;text-align:center;max-width:600px}
  h1{color:#ff394b;margin-bottom:8px} p{color:#ccc}
  .status{margin:20px 0;padding:12px;border-radius:10px;background:rgba(255,255,255,0.05)}
  .btn{display:inline-block;padding:12px 20px;border-radius:10px;background:linear-gradient(135deg,#e11d2e,#ff394b);color:#fff;text-decoration:none;font-weight:bold}
</style>
</head>
<body>
  <div class="box">
    <h1>Pagamento recebido</h1>
    <p>Seu pedido foi enviado com sucesso.</p>

    <div class="status" id="statusBox">Verificando informações...</div>

    <p>Após a confirmação do pagamento, sua hosting será entregue.</p>
    <a href="/hosting.html" class="btn">Voltar para o site</a>
  </div>

 <script>
const PENDING_KEY = "sx_pending_checkout";
const LOCK_KEY = "sx_notify_sent";
const ME_URL = "/.netlify/functions/me-hosting";
const NOTIFY_URL = "/.netlify/functions/notify-purchase";

function getParam(name) {
  try { return new URL(window.location.href).searchParams.get(name); } catch { return null; }
}

async function fetchMeHosting() {
  try {
    const r = await fetch(ME_URL, { credentials: 'same-origin', cache: 'no-store' });
    if (!r.ok) return null;
    const j = await r.json().catch(()=>null);
    return j && j.ok ? j : null;
  } catch (e) { return null; }
}

async function notifyPurchase(discordId, plan) {
  try {
    const payload = {
      discord_id: String(discordId),
      plan: plan || "barato"
    };

    const resp = await fetch(NOTIFY_URL, {
      method: "POST",
      credentials: "same-origin",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const body = await resp.json().catch(()=>({}));
    return { ok: resp.ok, status: resp.status, body };
  } catch (err) {
    return { ok: false, error: String(err) };
  }
}

(async function main() {
  const statusBox = document.getElementById("statusBox");

  if (sessionStorage.getItem(LOCK_KEY)) {
    if (statusBox) statusBox.innerHTML = "✔️ Pedido já processado.";
    return;
  }

  if (statusBox) statusBox.innerHTML = "Verificando informações...";

  // 1) localStorage
  let pending = null;
  try {
    pending = JSON.parse(localStorage.getItem(PENDING_KEY) || "null");
  } catch(e) { pending = null; }

  // 2) pegar dados (compatível com tudo)
  let discordId =
    pending?.discord_id ||
    pending?.discordId ||
    getParam("ref") ||
    getParam("discord_id") ||
    null;

  let plan =
    pending?.plan ||
    pending?.plano ||
    getParam("plan") ||
    getParam("plano") ||
    "barato";

  // 3) fallback me-hosting
  if (!discordId) {
    const me = await fetchMeHosting();
    if (me && me.discord_id) {
      discordId = me.discord_id;
    }
  }

  if (!discordId) {
    if (statusBox) statusBox.innerHTML = "⚠️ Não foi possível identificar o cliente.";
    return;
  }

  if (statusBox) {
    statusBox.innerHTML =
      `✔️ Cliente identificado<br>ID: <b>${discordId}</b><br><br>Registrando pedido...`;
  }

  // 4) notify
  const res = await notifyPurchase(discordId, plan);

  if (res.ok) {
    sessionStorage.setItem(LOCK_KEY, "1");
    try { localStorage.removeItem(PENDING_KEY); } catch(e){}

    if (statusBox) {
      statusBox.innerHTML +=
        `<br><br>✅ ${res.body?.message || "Pedido registrado com sucesso."}<br>` +
        `Sua hosting será entregue automaticamente em instantes.`;
    }
  } else {
    const msg =
      res.body?.message ||
      res.body?.error ||
      res.error ||
      `HTTP ${res.status}`;

    if (statusBox) {
      statusBox.innerHTML += `<br><br>⚠️ Problema ao registrar pedido: ${msg}`;
    }

    console.error("notify-purchase error:", res);
  }
})();
</script>
</body>
</html>
