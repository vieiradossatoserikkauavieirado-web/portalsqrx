<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hosting SX | Pagamento</title>
<style>
  body{margin:0;font-family:Arial;background:#0b0b0d;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh}
  .box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);padding:40px;border-radius:20px;text-align:center;max-width:600px}
  h1{color:#ff394b;margin-bottom:8px} p{color:#ccc}
  .status{margin:20px 0;padding:12px;border-radius:10px;background:rgba(255,255,255,0.05)}
  .btn{display:inline-block;padding:12px 20px;border-radius:10px;background:linear-gradient(135deg,#e11d2e,#ff394b);color:#fff;text-decoration:none;font-weight:bold}
</style>
</head>
<body>
  <div class="box">
    <h1>Pagamento recebido</h1>
    <p>Seu pedido foi enviado com sucesso.</p>

    <div class="status" id="statusBox">Verificando informações...</div>

    <p>Após a confirmação do pagamento, sua hosting será entregue.</p>
    <a href="/hosting.html" class="btn">Voltar para o site</a>
  </div>

  <script>
function getParam(name) {
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

const statusBox = document.getElementById("statusBox");

async function fetchMeHosting() {
  try {
    const r = await fetch("/.netlify/functions/me-hosting", { credentials: 'same-origin' });
    if (!r.ok) return null;
    const j = await r.json().catch(()=>null);
    return j && j.discord_id ? j : null;
  } catch (e) { return null; }
}

async function notifyPurchase(discordId, plan) {
  try {
    const payload = { discord_id: String(discordId) };
    if (plan) payload.plan = plan;

    const resp = await fetch("/.netlify/functions/notify-purchase", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await resp.json().catch(()=>({}));
    return { ok: resp.ok, status: resp.status, body: data };
  } catch (err) {
    return { ok: false, error: String(err) };
  }
}

(async function main() {
  statusBox.innerHTML = "Verificando informações...";

  // 1) tenta localStorage (persistência antes do checkout)
  let pending = null;
  try {
    const raw = localStorage.getItem('sx_pending_checkout');
    if (raw) pending = JSON.parse(raw);
  } catch(e) { /* ignore */ }

  // 2) fallback: query params
  let discordId = pending?.discord_id || getParam('ref') || null;
  let plan = pending?.plan || getParam('plan') || null;

  // 3) fallback final: chamar me-hosting (usa cookie de sessão)
  if (!discordId) {
    const me = await fetchMeHosting();
    if (me && me.discord_id) {
      discordId = me.discord_id;
      // se me retornar plano (não usual), use
    }
  }

  if (!discordId) {
    statusBox.innerHTML = "⚠️ Não foi possível identificar o cliente.";
    // limpa localStorage só por segurança
    localStorage.removeItem('sx_pending_checkout');
    return;
  }

  // mostra id na tela
  statusBox.innerHTML = `
    ✔️ Cliente identificado<br>
    ID: <b>${discordId}</b><br><br>
    Aguarde enquanto verificamos seu pagamento.
  `;

  // tenta notificar o server (envia plan se existir)
  const res = await notifyPurchase(discordId, plan);

  if (res.ok) {
    // sucesso: mostra mensagem e limpa pending
    statusBox.innerHTML += `<br><br>✅ ${res.body?.message || 'Pedido registrado com sucesso.'}`;
    // opcional: mostrar pedido/retorno
    // limpar localStorage
    localStorage.removeItem('sx_pending_checkout');
  } else {
    // falha: exibe motivo legível
    const msg = res.body?.message || res.body?.error || res.error || `HTTP ${res.status}`;
    statusBox.innerHTML += `<br><br>⚠️ Problema ao registrar pedido: ${msg}`;
    // manter localStorage por segurança (para tentar reprocessar manualmente)
  }
})();
</script>
</body>
</html>
