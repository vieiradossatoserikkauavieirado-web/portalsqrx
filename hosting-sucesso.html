<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hosting SX | Pagamento</title>
<style>
  body{margin:0;font-family:Arial;background:#0b0b0d;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh}
  .box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);padding:40px;border-radius:20px;text-align:center;max-width:600px}
  h1{color:#ff394b;margin-bottom:8px} p{color:#ccc}
  .status{margin:20px 0;padding:12px;border-radius:10px;background:rgba(255,255,255,0.05)}
  .btn{display:inline-block;padding:12px 20px;border-radius:10px;background:linear-gradient(135deg,#e11d2e,#ff394b);color:#fff;text-decoration:none;font-weight:bold}
</style>
</head>
<body>
  <div class="box">
    <h1>Pagamento recebido</h1>
    <p>Seu pedido foi enviado com sucesso.</p>

    <div class="status" id="statusBox">Verificando informações...</div>

    <p>Após a confirmação do pagamento, sua hosting será entregue.</p>
    <a href="/hosting.html" class="btn">Voltar para o site</a>
  </div>

<script>
function getParam(name){
  const u=new URL(window.location.href);
  return u.searchParams.get(name);
}

const statusBox=document.getElementById('statusBox');
const ref = getParam('ref'); // discord id passado via ?ref=
const plan = getParam('plan') || getParam('plano') || 'desconhecido';

if(!ref){
  statusBox.innerHTML = "⚠️ Não foi possível identificar o cliente.";
} else {
  statusBox.innerHTML = `✔️ Cliente identificado<br>ID: <b>${ref}</b><br><br>Aguarde enquanto verificamos seu pagamento...`;

  // chama sua função server-side que registra o pedido
  (async () => {
    try {
      const resp = await fetch('/.netlify/functions/notify-purchase', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          discord_id: ref,
          plano: plan,
          checkout_ref: getParam('checkout_ref') || null
        })
      });

      const json = await resp.json();
      if(resp.ok){
        statusBox.innerHTML = `
          ✅ Cliente identificado<br>
          ID: <b>${ref}</b><br><br>
          ${json.message || 'Seu pedido foi registrado. Aguarde confirmação no Discord.'}
        `;
      } else {
        statusBox.innerHTML = `
          ⚠️ Problema ao notificar o servidor.<br>
          Motivo: ${json.error || 'erro desconhecido'}<br>
          Entre em contato no suporte se seu pagamento foi confirmado.
        `;
        console.error('notify-purchase error:', json);
      }
    } catch (err) {
      console.error('fetch notify-purchase failed', err);
      statusBox.innerHTML = '⚠️ Erro ao tentar notificar o servidor. Tente novamente mais tarde.';
    }
  })();
}
</script>
</body>
</html>
