<!-- Exemplo de botão(s) de compra -->
<button class="btn-buy" data-plan="barato" data-checkout="https://checkout.infinitepay.io/siqueira-santos-12/xI8ZrO3sn">
  Comprar Plano Barato
</button>

<button class="btn-buy" data-plan="bom" data-checkout="https://checkout.infinitepay.io/siqueira-santos-12/1a1sxgskt">
  Comprar Plano Bom
</button>

<script>
async function getDiscordIdFromSession() {
  // chama a função server-side que retorna discord_id a partir do cookie sx_hosting_session
  try {
    const res = await fetch('/.netlify/functions/get-session', {
      method: 'GET',
      credentials: 'same-origin', // envia cookies
      headers: { 'Content-Type': 'application/json' }
    });
    if (!res.ok) {
      console.warn('get-session falhou', await res.text());
      return null;
    }
    const json = await res.json();
    return json.discord_id || null;
  } catch (err) {
    console.error('Erro get-session:', err);
    return null;
  }
}

document.querySelectorAll('.btn-buy').forEach(btn => {
  btn.addEventListener('click', async (e) => {
    const checkout = btn.dataset.checkout;
    const plan = btn.dataset.plan || 'desconhecido';

    // tenta obter discord id do backend (mais seguro que ler cookie no client)
    const discordId = await getDiscordIdFromSession();
    if (!discordId) {
      alert('Você precisa estar logado com Discord antes de comprar. Faça login e tente novamente.');
      // opcional: redirecionar para /login
      return;
    }

    // constrói link com ref e plan (e opcional checkout_ref)
    const url = `${checkout}?ref=${encodeURIComponent(discordId)}&plan=${encodeURIComponent(plan)}`;
    window.location.href = url;
  });
});
</script>
