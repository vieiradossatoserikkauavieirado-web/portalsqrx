<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Portal SiqueiraX</title>

  <link rel="icon" href="https://i.imgur.com/eKjFtd1.png" sizes="32x32" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --red-main:#ff002b;
      --red-dark:#b0001c;
      --glass:rgba(15,15,15,.74);
      --glass-2:rgba(18,18,18,.58);
      --border:rgba(255,255,255,.10);
      --transition:.28s ease;
      --shadow:0 18px 45px rgba(0,0,0,.45);
      --text-dim:rgba(255,255,255,.78);
      --max:560px;
    }
    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:'Inter',sans-serif;
      background:url('https://i.imgur.com/eKjFtd1.png') center/cover fixed no-repeat;
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.64);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      z-index:-1;
    }

    .card{
      width:min(var(--max), 92%);
      background:linear-gradient(180deg,var(--glass),var(--glass-2));
      border:1px solid var(--border);
      border-radius:24px;
      padding:2.2rem 1.6rem;
      box-shadow:var(--shadow);
      text-align:center;
    }

    h1{
      font-family:'Orbitron',sans-serif;
      font-size:1.6rem;
      letter-spacing:2px;
      margin-bottom:.6rem;
      background:linear-gradient(90deg,#ff002b,#ff4d4d);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    p{
      color:var(--text-dim);
      font-weight:600;
      margin-bottom:1.2rem;
    }

    .error{
      display:none;
      margin:0 auto 1rem;
      padding:.7rem .9rem;
      border-radius:16px;
      border:1px solid rgba(255,0,43,.22);
      background:rgba(255,0,43,.10);
      color:#ffb1b1;
      font-weight:800;
      text-align:left;
    }

    .login-btn{
      width:100%;
      padding:1rem;
      border:none;
      border-radius:18px;
      background:linear-gradient(135deg,var(--red-main),var(--red-dark));
      color:#fff;
      font-weight:900;
      font-size:1rem;
      cursor:pointer;
      transition:transform var(--transition), filter var(--transition);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:.7rem;
      text-decoration:none;
      user-select:none;
    }
    .login-btn:hover{ transform:translateY(-2px); filter:saturate(1.05); }
    .login-btn:active{ transform:translateY(0); }

    .small{
      margin-top:1.1rem;
      font-size:.85rem;
      opacity:.65;
      color:var(--text-dim);
    }

    .back{
      display:inline-block;
      margin-top:1rem;
      color:rgba(255,255,255,.82);
      font-weight:800;
      text-decoration:none;
      opacity:.85;
    }
    .back:hover{opacity:1}
  </style>
</head>

<body>
  <div class="card">
    <h1>Portal SiqueiraX</h1>
    <p>Entre com Discord para cadastrar ou destacar seu servidor.</p>

    <div id="errorBox" class="error"></div>

    <a id="loginBtn" class="login-btn" href="#">
      <!-- ícone discord simples -->
      <svg width="20" height="20" viewBox="0 0 127.14 96.36" fill="white" aria-hidden="true">
        <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0.5a72.06,72.06,0,0,0-3.36,6.9,97.68,97.68,0,0,0-29.08,0A72.37,72.37,0,0,0,45.67,0.5,105.89,105.89,0,0,0,19.43,8.07C2.79,32.65-1.71,56.63,0.5,80.27A105.73,105.73,0,0,0,32.71,96.36a77.7,77.7,0,0,0,6.6-10.73,68.42,68.42,0,0,1-10.42-4.95c.88-.66,1.74-1.34,2.57-2.05a75.57,75.57,0,0,0,64.28,0c.84.71,1.7,1.39,2.58,2.05a68.68,68.68,0,0,1-10.44,4.95,77.25,77.25,0,0,0,6.59,10.73A105.25,105.25,0,0,0,126.64,80.27C129.36,53.4,122.09,29.7,107.7,8.07ZM42.45,65.69c-6.27,0-11.42-5.72-11.42-12.75S36,40.19,42.45,40.19s11.5,5.75,11.42,12.75C53.87,59.97,48.8,65.69,42.45,65.69Zm42.24,0c-6.27,0-11.42-5.72-11.42-12.75S78.24,40.19,84.69,40.19s11.5,5.75,11.42,12.75C96.11,59.97,91,65.69,84.69,65.69Z"/>
      </svg>
      Entrar com Discord
    </a>

    <a class="back" href="index.html">← Voltar</a>

    <div class="small">
      Login rápido e seguro. Você volta automaticamente para onde estava.
    </div>
  </div>

  <script>
    // ✅ coloque seu client id aqui:
    const DISCORD_CLIENT_ID = "1179849768638361722";

    const params = new URLSearchParams(window.location.search);
    const next = params.get("next") || "index.html#ranking-servidores";

    const redirectUri = "https://portalsiqueirax.com.br/.netlify/functions/discord-callback-portal";

    // state carrega o "next" (pra callback te mandar de volta certinho)
    const authUrl =
    "https://discord.com/api/oauth2/authorize" +
    `?client_id=${encodeURIComponent(DISCORD_CLIENT_ID)}` +
    `&redirect_uri=${encodeURIComponent(redirectUri)}` +
    `&response_type=code` +
    `&scope=identify` +
    `&state=${encodeURIComponent(next)}`;

    document.getElementById("loginBtn").href = authUrl;

    const err = params.get("err");
    if (err) {
      const box = document.getElementById("errorBox");
      box.style.display = "block";
      box.textContent = "Erro ao fazer login com Discord. Tente novamente.";
    }
  </script>
</body>
</html>
