<!-- renovar-hosting.html -->
<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Renovar hosting</title>
  <style>
    body{font-family:system-ui,Arial,sans-serif;max-width:820px;margin:24px auto;padding:0 16px;color:#111}
    .card{border:1px solid #eee;border-radius:14px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.04)}
    .muted{color:#666}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .btn{display:inline-block;border:0;border-radius:10px;padding:12px 16px;cursor:pointer;text-decoration:none;font-weight:700}
    .btn-red{background:#b91c1c;color:#fff}
    .btn-dark{background:#111;color:#fff}
    .item{border:1px solid #eee;border-radius:12px;padding:14px;margin-top:12px}
    .tag{display:inline-block;background:#fee2e2;color:#991b1b;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700}
    .k{font-weight:700}
    .sep{height:1px;background:#eee;margin:16px 0}
    pre{white-space:pre-wrap;background:#fafafa;border:1px solid #eee;border-radius:10px;padding:12px;overflow:auto}
  </style>
</head>
<body>
  <div class="card">
    <div class="tag">Renovação de hosting</div>
    <h1>Renovar sua hospedagem</h1>
    <p class="muted">Primeiro entramos com seu Discord. Depois mostramos sua host e o valor da renovação.</p>

    <div id="authBox">
      <p id="authStatus" class="muted">Verificando login...</p>
      <a id="loginBtn" class="btn btn-red" href="/discord-login-hosting" style="display:none;">Entrar com Discord</a>
    </div>

    <div id="contentBox" style="display:none;">
      <div class="sep"></div>
      <p><span class="k">Cliente:</span> <span id="clienteNome"></span></p>
      <p><span class="k">Discord ID:</span> <span id="clienteId"></span></p>

      <div id="hostsBox"></div>
      <div id="debug" style="margin-top:14px;"></div>
    </div>
  </div>

<script>
const ME_URL = "/.netlify/functions/me-hosting";
const RENEW_INFO_URL = "/.netlify/functions/renew-info";

const PLANOS_VALOR = {
  barato: "R$8,59",
  bom: "R$16,00",
  otimo: "R$33,00"
};

 const CHECKOUT_LINKS = {
    barato: "https://checkout.infinitepay.io/siqueira-santos-12/7fsMNuC0wd",
    bom:    "https://checkout.infinitepay.io/siqueira-santos-12/1HJOfTzEtl",
    otimo:  "https://checkout.infinitepay.io/siqueira-santos-12/2Car3sqxT"
  };

function fmtDate(d) {
  try {
    return new Date(d).toLocaleString("pt-BR");
  } catch {
    return "n/d";
  }
}

function getPlanKey(host) {
  return (host?.plano || host?.plano_key || "barato").toLowerCase();
}

async function fetchMeHosting() {
  try {
    const r = await fetch(ME_URL, { credentials: "same-origin", cache: "no-store" });
    if (!r.ok) return null;
    const j = await r.json().catch(() => null);
    return j && j.ok ? j : null;
  } catch {
    return null;
  }
}

async function fetchRenewInfoByDiscord(discordId) {
  try {
    const r = await fetch(RENEW_INFO_URL, {
      method: "POST",
      credentials: "same-origin",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ discord_id: String(discordId) })
    });
    const j = await r.json().catch(() => null);
    return { ok: r.ok, status: r.status, body: j };
  } catch (e) {
    return { ok: false, error: String(e) };
  }
}

function makeCheckoutUrl({ hostLogin, discordId, planKey }) {
  const state = Math.random().toString(36).slice(2, 12);
  const txRef = `renew-${Date.now()}`;
  const amount = (PLANOS_VALOR[planKey] || PLANOS_VALOR.barato).replace("R$", "").replace(",", ".");

  const successUrl =
    `https://portalsiqueirax.com.br/hosting-renovado-sucesso.html` +
    `?host=${encodeURIComponent(hostLogin)}` +
    `&plan=${encodeURIComponent(planKey)}` +
    `&discord_id=${encodeURIComponent(discordId)}` +
    `&tx=${encodeURIComponent(txRef)}` +
    `&state=${encodeURIComponent(state)}`;

  sessionStorage.setItem(`renew_state_${txRef}`, state);

  const base = CHECKOUT_LINKS[planKey] || CHECKOUT_LINKS.barato;
  return `${base}?return_url=${encodeURIComponent(successUrl)}&tx_ref=${encodeURIComponent(txRef)}&amount=${encodeURIComponent(amount)}`;
}

(async function main() {
  const authStatus = document.getElementById("authStatus");
  const loginBtn = document.getElementById("loginBtn");
  const contentBox = document.getElementById("contentBox");
  const clienteNome = document.getElementById("clienteNome");
  const clienteId = document.getElementById("clienteId");
  const hostsBox = document.getElementById("hostsBox");
  const debug = document.getElementById("debug");

  authStatus.textContent = "Verificando login...";

  const me = await fetchMeHosting();

  if (!me || !me.ok) {
    authStatus.textContent = "Você precisa entrar com Discord para ver sua host.";
    loginBtn.style.display = "inline-block";
    return;
  }

  const discordId = me.discord_id;
  clienteNome.textContent = me.username || "n/d";
  clienteId.textContent = discordId;
  contentBox.style.display = "block";
  authStatus.textContent = "";

  const info = await fetchRenewInfoByDiscord(discordId);

  if (!info.ok || !info.body || !info.body.ok) {
    hostsBox.innerHTML = `<p class="muted">Não foi possível carregar suas hosts.</p>`;
    debug.innerText = JSON.stringify(info, null, 2);
    return;
  }

  const hosts = info.body.hosts || (info.body.host ? [info.body.host] : []);

  if (!hosts.length) {
    hostsBox.innerHTML = `<p class="muted">Nenhuma host encontrada para sua conta.</p>`;
    return;
  }

  hostsBox.innerHTML = "";
  hosts.forEach((host) => {
    const planKey = getPlanKey(host);
    const valor = PLANOS_VALOR[planKey] || "R$0,00";
    const hostLogin = host.login_host || host.login || "n/d";
    const venc = host.data_vencimento || null;

    const box = document.createElement("div");
    box.className = "item";
    box.innerHTML = `
      <p><span class="k">Host:</span> ${hostLogin}</p>
      <p><span class="k">Plano:</span> ${planKey}</p>
      <p><span class="k">Vencimento:</span> ${venc ? fmtDate(venc) : "n/d"}</p>
      <p><span class="k">Valor da renovação:</span> ${valor}</p>
    `;

    const btn = document.createElement("a");
    btn.className = "btn btn-red";
    btn.textContent = "Renovar agora";
    btn.href = makeCheckoutUrl({
      hostLogin,
      discordId,
      planKey
    });

    box.appendChild(btn);
    hostsBox.appendChild(box);
  });
})();
</script>
</body>
</html>
