<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servidores - Portal SiqueiraX</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter',sans-serif;
  background:#0e0e0e;
  color:#fff;
  margin:0;
  padding:0;
}

.container{
  max-width:1000px;
  margin:40px auto;
  padding:20px;
}

h1{
  font-family:'Orbitron',sans-serif;
  text-align:center;
  color:#ff2b2b;
}

.tabs{
  display:flex;
  justify-content:center;
  margin:30px 0;
  gap:20px;
}

.tab-btn{
  padding:10px 20px;
  background:#1a1a1a;
  border:1px solid #333;
  cursor:pointer;
  font-weight:700;
  border-radius:8px;
}

.tab-btn.active{
  background:#ff002b;
}

.section{
  display:none;
}

.section.active{
  display:block;
}

.card{
  background:#1a1a1a;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
  border:1px solid #333;
}

.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:800;
}

.badge.approved{ background:green; }
.badge.pending{ background:orange; }
.badge.premium{ background:#ff002b; }

button{
  padding:8px 15px;
  margin-top:10px;
  background:#ff002b;
  border:none;
  color:#fff;
  font-weight:700;
  cursor:pointer;
  border-radius:6px;
}

form input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#1a1a1a;
  border:1px solid #333;
  color:#fff;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Gerenciar Servidores</h1>

  <div class="tabs">
    <div class="tab-btn active" onclick="showTab('meus')">📂 Meus Servidores</div>
    <div class="tab-btn" onclick="showTab('novo')">➕ Cadastrar Novo</div>
  </div>

  <!-- MEUS SERVIDORES -->
  <div id="meus" class="section active">
    <div id="serverList">Carregando...</div>
  </div>

  <!-- NOVO SERVIDOR -->
  <div id="novo" class="section">
    <form id="serverForm">
      <input type="text" name="name" placeholder="Nome do Servidor" required>
      <input type="text" name="ip" placeholder="IP:PORTA" required>
      <input type="text" name="discord" placeholder="Link Discord">
      <input type="text" name="logoUrl" placeholder="URL da Logo">
      <button type="submit">Cadastrar</button>
    </form>
    <div id="formMsg"></div>
  </div>
</div>

<script>

// ===== TABS =====
function showTab(tab){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
}

// ===== CARREGAR SERVIDORES =====
async function loadServers(){
  const r = await fetch("/.netlify/functions/server_my_list", {
    credentials:"include"
  });

  if(r.status === 401){
    window.location.href = "loginportal.html";
    return;
  }

  const data = await r.json();
  const list = document.getElementById("serverList");
  list.innerHTML = "";

  if(!data.items.length){
    list.innerHTML = "Você ainda não cadastrou servidores.";
    return;
  }

  data.items.forEach(s=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${s.name}</strong><br>
      ${s.ip}<br><br>

      <span class="badge ${s.status}">
        ${s.status.toUpperCase()}
      </span>

      ${s.isPremium ? `<span class="badge premium">🔥 PREMIUM</span>` : ""}

      <br>
      ${!s.isPremium ? `<button onclick="destacar('${s.serverId}')">🔥 Destacar</button>` : ""}
    `;

    list.appendChild(div);
  });
}

// ===== CADASTRAR =====
document.getElementById("serverForm").addEventListener("submit", async e=>{
  e.preventDefault();

  const form = new FormData(e.target);

  const r = await fetch("/.netlify/functions/server_submit",{
    method:"POST",
    credentials:"include",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      name: form.get("name"),
      ip: form.get("ip"),
      discord: form.get("discord"),
      logoUrl: form.get("logoUrl")
    })
  });

  if(r.status === 401){
    window.location.href = "loginportal.html";
    return;
  }

  document.getElementById("formMsg").innerText = "Servidor enviado para análise!";
  e.target.reset();
});

// ===== DESTACAR =====
async function destacar(serverId){
  const plano = confirm("Escolher OK = 7 dias (R$15) \nCancelar = 30 dias (R$39,90)") 
    ? "weekly" 
    : "monthly";

  const r = await fetch("/.netlify/functions/criar-checkout-server",{
    method:"POST",
    credentials:"include",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ plano, serverId })
  });

  const data = await r.json();

  if(data.checkout_url){
    window.location.href = data.checkout_url;
  }
}

// INIT
loadServers();

</script>

</body>
</html>
