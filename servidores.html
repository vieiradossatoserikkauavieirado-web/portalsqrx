<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servidores - Portal SiqueiraX</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter',sans-serif;
  background:#0e0e0e;
  color:#fff;
  margin:0;
}

.container{
  max-width:1000px;
  margin:40px auto;
  padding:20px;
}

h1{
  font-family:'Orbitron',sans-serif;
  text-align:center;
  color:#ff2b2b;
}

.tabs{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:30px 0;
}

.tab-btn{
  padding:10px 20px;
  background:#1a1a1a;
  border:1px solid #333;
  border-radius:8px;
  cursor:pointer;
  font-weight:700;
}

.tab-btn.active{
  background:#ff002b;
}

.section{ display:none; }
.section.active{ display:block; }

.card{
  background:#1a1a1a;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
  border:1px solid #333;
}

.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:800;
  margin-right:5px;
}

.badge.approved{ background:green; }
.badge.pending{ background:orange; }
.badge.rejected{ background:red; }
.badge.premium{ background:#ff002b; }

button{
  padding:8px 15px;
  margin-top:10px;
  background:#ff002b;
  border:none;
  color:#fff;
  font-weight:700;
  cursor:pointer;
  border-radius:6px;
}

form input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#1a1a1a;
  border:1px solid #333;
  color:#fff;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Gerenciar Servidores</h1>

  <div class="tabs">
    <div class="tab-btn active" onclick="switchTab(event,'meus')">📂 Meus Servidores</div>
    <div class="tab-btn" onclick="switchTab(event,'novo')">➕ Cadastrar Novo</div>
  </div>

  <!-- MEUS SERVIDORES -->
  <div id="meus" class="section active">
    <div id="serverList">Carregando...</div>
  </div>

  <!-- NOVO SERVIDOR -->
  <div id="novo" class="section">
    <form id="serverForm">
      <input type="text" name="name" placeholder="Nome do Servidor" required>
      <input type="text" name="ip" placeholder="IP:PORTA (ex: 51.222.1.1:7777)" required>
      <input type="text" name="discord" placeholder="Link Discord (opcional)">
      <input type="text" name="logoUrl" placeholder="URL da Logo (Imgur)">
      <button type="submit">Cadastrar</button>
    </form>
    <div id="formMsg"></div>
  </div>
</div>

<script>
// ===== VERIFICAR LOGIN =====
async function checkLogin(){
  const r = await fetch("/.netlify/functions/me_portal", { credentials:"include" });

  if(r.status === 401){
    window.location.href = "loginportal.html";
    return false;
  }
  return true;
}

// ===== TROCAR ABA =====
function switchTab(e,tab){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));

  document.getElementById(tab).classList.add("active");
  e.target.classList.add("active");
}

// ===== CARREGAR SERVIDORES =====
async function loadServers(){
  const r = await fetch("/.netlify/functions/server_my_list", { credentials:"include" });

  if(r.status === 401){
    window.location.href = "loginportal.html";
    return;
  }

  const data = await r.json();
  const list = document.getElementById("serverList");
  list.innerHTML = "";

  if(!data.items || !data.items.length){
    list.innerHTML = "Você ainda não cadastrou servidores.";
    return;
  }

  data.items.forEach(s=>{
    const div = document.createElement("div");
    div.className = "card";

    const statusClass = s.status || "pending";

    div.innerHTML = `
      <strong>${escapeHtml(s.name || "")}</strong><br>
      ${escapeHtml(s.ip || "")}<br><br>

      <span class="badge ${escapeAttr(statusClass)}">
        ${escapeHtml(String(statusClass).toUpperCase())}
      </span>

      ${s.isPremium ? `<span class="badge premium">🔥 PREMIUM</span>` : ""}

      <br>
      ${!s.isPremium && s.status === "approved"
        ? `<button onclick="destacar('${escapeJsStr(s.serverId)}', '${escapeJsStr(s.name || s.serverId)}')">🔥 Destacar</button>`
        : ""
      }
    `;

    list.appendChild(div);
  });
}

// ===== CADASTRAR SERVIDOR =====
document.getElementById("serverForm").addEventListener("submit", async e=>{
  e.preventDefault();

  const form = new FormData(e.target);

  const r = await fetch("/.netlify/functions/server_submit",{
    method:"POST",
    credentials:"include",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      name: form.get("name"),
      ip: form.get("ip"),
      discord: form.get("discord"),
      logoUrl: form.get("logoUrl")
    })
  });

  const txt = await r.text();
  console.log("STATUS:", r.status);
  console.log("BODY:", txt);

  if(r.status === 401){
    window.location.href = "loginportal.html";
    return;
  }

  document.getElementById("formMsg").innerText = "Servidor enviado para análise!";
  e.target.reset();
  loadServers();
});

// ===== PREMIUM MODAL (STATE + UI) =====
const premiumState = {
  serverId: null,
  serverName: null,
  plano: null,        // 'weekly' | 'monthly'
  busy: false
};

function abrirPremiumModal(serverId, serverName){
  premiumState.serverId = serverId;
  premiumState.serverName = serverName || serverId;
  premiumState.plano = null;
  premiumState.busy = false;

  const modal = document.getElementById("premiumModal");
  const label = document.getElementById("premiumServerLabel");
  const btn = document.getElementById("premiumContinuarBtn");

  if(label) label.textContent = premiumState.serverName;

  document.querySelectorAll("#premiumModal .plan").forEach(p => p.classList.remove("selected"));

  if(btn){
    btn.disabled = true;
    btn.textContent = "Continuar para pagamento";
  }

  modal.classList.add("show");
  modal.setAttribute("aria-hidden","false");
}

function fecharPremiumModal(){
  const modal = document.getElementById("premiumModal");
  modal.classList.remove("show");
  modal.setAttribute("aria-hidden","true");
}

function premiumSelecionar(planoUI){
  // planoUI: '7d' | '30d'
  premiumState.plano = (planoUI === "7d") ? "weekly" : "monthly";

  const plans = document.querySelectorAll("#premiumModal .plan");
  plans.forEach(p => p.classList.remove("selected"));
  const idx = (planoUI === "7d") ? 0 : 1;
  if(plans[idx]) plans[idx].classList.add("selected");

  const btn = document.getElementById("premiumContinuarBtn");
  if(btn) btn.disabled = false;
}

async function premiumContinuar(){
  if(premiumState.busy) return;
  if(!premiumState.serverId || !premiumState.plano) return;

  premiumState.busy = true;

  const btn = document.getElementById("premiumContinuarBtn");
  if(btn){
    btn.disabled = true;
    btn.textContent = "Gerando checkout...";
  }

  try{
    const r = await fetch("/.netlify/functions/criar-checkout-server",{
      method:"POST",
      credentials:"include",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ plano: premiumState.plano, serverId: premiumState.serverId })
    });

    if(r.status === 401){
      window.location.href = "loginportal.html";
      return;
    }

    const data = await r.json().catch(()=>null);

    if(data?.checkout_url){
      window.location.href = data.checkout_url;
      return;
    }

    alert("Erro ao criar checkout.");
  }catch(err){
    console.error(err);
    alert("Erro ao criar checkout.");
  }finally{
    premiumState.busy = false;
    if(btn){
      btn.textContent = "Continuar para pagamento";
      btn.disabled = false;
    }
  }
}

// fechar clicando fora + ESC
document.addEventListener("click", (e)=>{
  const modal = document.getElementById("premiumModal");
  if(!modal?.classList.contains("show")) return;
  if(e.target === modal) fecharPremiumModal();
});

document.addEventListener("keydown", (e)=>{
  if(e.key !== "Escape") return;
  const modal = document.getElementById("premiumModal");
  if(modal?.classList.contains("show")) fecharPremiumModal();
});

// ===== DESTACAR (abre modal) =====
function destacar(serverId, serverName){
  abrirPremiumModal(serverId, serverName);
}

// ===== utils (escape mínimo p/ innerHTML + onclick) =====
function escapeHtml(s){
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

function escapeAttr(s){
  return String(s).replaceAll('"',"&quot;").replaceAll("'","&#39;");
}

function escapeJsStr(s){
  return String(s)
    .replaceAll("\\","\\\\")
    .replaceAll("'","\\'")
    .replaceAll("\n","\\n")
    .replaceAll("\r","\\r");
}

// ===== INIT =====
(async ()=>{
  const ok = await checkLogin();
  if(ok) loadServers();
})();
</script>

</body>
</html>
